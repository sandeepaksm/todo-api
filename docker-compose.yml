version: "3.9"

services:

  db:
    image: postgres:16-alpine
    container_name: todo_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tododb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    # Always restart if crashes
    restart: unless-stopped

  app:
    image: sandeep2862/todo-api:latest
    container_name: todo_app
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/tododb
      APP_NAME: Todo API
      APP_VERSION: 1.0.0
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    # Always restart if crashes
    restart: unless-stopped
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

volumes:
  postgres_data:

